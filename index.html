<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaylorArt</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    
    <meta property="og:title" content="Saylor Portraits">
    <meta property="og:description" content="Michael Saylor Art">
    <meta property="og:type" content="gallery">
    <meta property="og:url" content="https://ladoger.art">
    <meta property="og:image" content="https://ladoger.art/1200-628.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="628">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Saylor Portraits">
    <meta name="twitter:description" content="Michael Saylor Art">
    <meta name="twitter:image" content="https://ladoger.art/1200-628.jpg">
    <meta name="twitter:site" content="@LaDoger">

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .content-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
        }
        h1 {
            margin: 0;
            text-align: center;
            width: 100%;
            color: white;
            font-family: 'Lexend', sans-serif;
            font-weight: bold;
            letter-spacing: -0.1em;
            font-size: 3em;
        }
        h2 {
            margin: 0 0 10px 0;
            text-align: center;
            width: 100%;
            font-size: 1em;
            font-weight: normal;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        h2 a {
            color: #FA660F;
            text-decoration: none;
        }
        .gallery-container {
            width: 100%;
            max-width: 540px;
            box-sizing: border-box;
            margin: 0 auto;
        }
        .gallery {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 0;
            margin-top: 2px;
            box-sizing: border-box;
            gap: 5px;
        }
        .gallery img, .gallery video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
        footer {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 1em;
            margin-top: auto;
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        footer a {
            color: #FA660F;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .content-wrapper {
                padding: 0;
            }
            .gallery-container {
                width: 100%;
            }
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PFS6XG5M9V"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PFS6XG5M9V');
    </script>
</head>

<body>
<div class="content-wrapper">
    <h1>Saylor Portraits</h1>
    <h2>These amazing <a href="https://x.com/saylor"><b>Michael Saylor</b></a> art are<br>meant to be spread everywhere!<br><b>Use them well.</b></h2>

    <div class="gallery-container">
        <div class="gallery" id="gallery"></div>
    </div>

    <footer>
        Made by <a href="https://x.com/LaDoger"><b>@LaDoger</b></a>
    </footer>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const gallery = document.getElementById('gallery');
        
        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const el = entry.target;
                    if (el.tagName === 'IMG') {
                        el.src = el.dataset.src;
                    } else if (el.tagName === 'VIDEO') {
                        if (el.dataset.poster) el.poster = el.dataset.poster;
                        if (el.dataset.src) {
                            el.src = el.dataset.src;
                            el.preload = 'metadata';
                        }
                    }
                    observer.unobserve(el);
                }
            });
        }, { rootMargin: '400px' });

        // Disable right-click/long-press globally
        // document.body.addEventListener('contextmenu', (e) => {
        //    e.preventDefault();
        // });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        Promise.all([
            fetch('pinned.txt').then(r => r.text()).catch(() => ''),
            fetch('images.txt').then(r => r.text())
        ]).then(([pinnedData, imagesData]) => {
                const pinnedNames = pinnedData.trim().split(/\r?\n/).filter(n => n.trim() !== '');
                const pinnedSet = new Set(pinnedNames);
                let imageNames = imagesData.trim().split(/\r?\n/).filter(name => name.trim() !== '' && !pinnedSet.has(name.trim()));

                // Shuffle non-pinned images
                imageNames = shuffleArray(imageNames);

                // Pinned first, then shuffled
                const allNames = [...pinnedNames, ...imageNames];

                // Load images
                allNames.forEach((name, index) => {
                    const isVideo = name.match(/\.(mp4|mov|webm|mkv|avi)$/i);
                    let element;
                    const mediaSrc = `images/${name}`;

                    if (isVideo) {
                        element = document.createElement('video');
                        element.controls = true;
                        element.loop = true;
                        element.playsInline = true;
                        const posterSrc = `images/${name.substring(0, name.lastIndexOf('.'))}.jpg`;

                        if (index < pinnedNames.length) {
                            // Pinned videos: load poster + src immediately, preload metadata for quick play
                            element.poster = posterSrc;
                            element.src = mediaSrc;
                            element.preload = 'metadata';
                        } else if (index < 3) {
                            element.poster = posterSrc;
                            element.src = mediaSrc;
                            element.preload = 'none';
                        } else {
                            element.preload = 'none';
                            element.dataset.poster = posterSrc;
                            element.dataset.src = mediaSrc;
                            observer.observe(element);
                        }

                    } else {
                        element = document.createElement('img');
                        element.alt = "Michael Saylor Portrait";

                        if (index < 3) {
                            element.src = mediaSrc;
                            if (index === 0) element.fetchPriority = 'high';
                        } else {
                            element.dataset.src = mediaSrc;
                            observer.observe(element);
                        }

                        element.style.cursor = 'pointer';
                        element.addEventListener('click', () => {
                            window.open(element.src || element.dataset.src, '_blank');
                        });
                    }
                    
                    gallery.appendChild(element);
                });
            })
            .catch(error => {
                console.error('Error fetching image list:', error);
                const errorMsg = document.createElement('p');
                errorMsg.textContent = 'Error loading gallery.';
                errorMsg.style.color = 'white';
                errorMsg.style.textAlign = 'center';
                gallery.appendChild(errorMsg);
            });
    });
</script>
</body>
</html>
